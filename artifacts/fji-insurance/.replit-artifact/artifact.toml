kind = "web"
previewPath = "/"
title = "Feliciano Jiron Insurance Agency"
version = "1.0.0"
id = "artifacts/fji-insurance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25498

[services.development]
run = "pnpm --filter @workspace/fji-insurance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fji-insurance", "run", "build" ]
publicDir = "artifacts/fji-insurance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/services/auto"
to = "/services/auto.html"

[[services.production.rewrites]]
from = "/services/home"
to = "/services/home.html"

[[services.production.rewrites]]
from = "/services/life"
to = "/services/life.html"

[[services.production.rewrites]]
from = "/services/business"
to = "/services/business.html"

[[services.production.rewrites]]
from = "/services/renters"
to = "/services/renters.html"

[[services.production.rewrites]]
from = "/services/boat"
to = "/services/boat.html"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25498"
BASE_PATH = "/"
